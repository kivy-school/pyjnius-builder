[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "android-pyjnius"
version = "35.0.0"
description = "Temporary pyjnius wrappers for the Android framework (android.jar, API 35). Generated by pyjnius-wrap; intended as a stand-in until a hand-curated android-pyjnius is published."
requires-python = ">=3.11"
dependencies = ["pyjnius"]

[tool.hatch.build.targets.wheel]
packages = ["src/android"]
